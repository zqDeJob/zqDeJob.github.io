# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: zqDeJob避风塘 ~
subtitle: '个人博客'
description: '随时随地，记录生活之文字版'
keywords:
author: zqDeJob
language: zh-CN
timezone: ''

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: https://zqdejob.github.io
permalink: :year/:month/:day/:title/

# Git 仓库（版本页 changelog 链接）
repo:
  github: zqDeJob/zqDeJob.github.io
  branch: master
  changelog_limit: 80
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
  AI: ai
  生活乐子: shenghuo-lezi
  研发二三事: yanfa
tag_map:

tag_generator:
  per_page: 10
category_generator:
  per_page: 10

# 本地搜索（配合 hexo-generator-searchdb + Butterfly local_search）
search:
  path: search.xml
  field: post
  content: true
  format: html

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# 站点图片（由 scripts/site-images.js 同步到 Butterfly 主题）
site_images:
  favicon: /img/AI.svg
  avatar: /img/AI.svg
  home_page: /img/home-page.png
  default_top: /img/home-page.png
  categories:
    AI: /img/home-page.png
    生活乐子: /img/home-page.png
    研发二三事: /img/home-page.png

# Auto cover for posts without `cover` in front matter
# provider: picsum（在线，按分类+slug 稳定配图）| local（使用 source/img/covers/{slug}.jpg）
auto_cover:
  enable: true
  provider: local
  width: 800
  height: 450
  # 新建文章、构建前自动下载封面并写入 front matter 的 cover（无需手动 pnpm run getimg）
  auto_fetch: true
  write_fm: true

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: butterfly

# Deployment
# 由 GitHub Actions 自动构建并发布（.github/workflows/deploy.yml）
# 本地仅预览/构建：pnpm exec hexo server | pnpm exec hexo generate
## Docs: https://hexo.io/docs/github-pages.html
deploy:
  type: ''
